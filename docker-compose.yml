# T006: Local Azurite container for Azure Table Storage (and Blob/Queue) emulation.
# Start with: docker compose up -d
# Table Storage endpoint: http://127.0.0.1:10002/devstoreaccount1

services:
  azurite:
    image: mcr.microsoft.com/azure-storage/azurite:latest
    container_name: polinks-azurite
    hostname: azurite
    restart: unless-stopped
    ports:
      - "10000:10000"  # Blob service
      - "10001:10001"  # Queue service
      - "10002:10002"  # Table service
    volumes:
      - azurite_data:/data
    command: >
      azurite
      --blobHost 0.0.0.0
      --queueHost 0.0.0.0
      --tableHost 0.0.0.0
      --location /data
      --debug /data/debug.log

volumes:
  azurite_data:
